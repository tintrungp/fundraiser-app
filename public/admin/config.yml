backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "fundraiser"
    label: "Fundraiser Settings"
    files:
      - label: "Fundraiser Configuration"
        name: "config"
        file: "data/fundraiser.json"
        fields:
          - { label: "Goal Amount", name: "goal", widget: "number" }
          - { label: "Current Amount", name: "current", widget: "number" }
          - { label: "Currency", name: "currency", widget: "string", default: "USD" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Donation Links"
            name: "donationLinks"
            widget: "list"
            fields:
              - { label: "Platform", name: "platform", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Description", name: "description", widget: "string" }
          - label: "Updates"
            name: "updates"
            widget: "list"
            fields:
              - { label: "Date", name: "date", widget: "datetime" }
              - { label: "Message", name: "message", widget: "text" }
